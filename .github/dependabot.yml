# Dependabot will run on day 3 of each month at 03:15 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '53 2 12 * *'
    open-pull-requests-limit: 15
    versioning-strategy: 'increase'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '53 2 12 * *'
    open-pull-requests-limit: 15
